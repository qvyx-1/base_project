<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NeoPulse Controller</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#0a0a1a;color:#e0e0e0;min-height:100vh}
.app{max-width:500px;margin:0 auto;padding:12px}
header{background:#12122a;border-radius:12px;padding:12px 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
header h1{font-size:1.2em;color:#7c6ff5}
.status{font-size:0.75em;color:#888;text-align:right}
.status span{display:block}
.card{background:#12122a;border-radius:12px;padding:14px;margin-bottom:12px}
.card h2{font-size:0.9em;color:#aaa;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px}
.btn{display:inline-block;padding:8px 14px;border:none;border-radius:8px;cursor:pointer;font-size:0.85em;font-weight:600;transition:all 0.15s;color:#fff}
.btn:active{transform:scale(0.95)}
.btn-primary{background:#7c6ff5}
.btn-success{background:#22c55e}
.btn-danger{background:#ef4444}
.btn-warning{background:#f59e0b;color:#000}
.btn-sm{padding:6px 10px;font-size:0.75em}
.btn-group{display:flex;gap:6px;flex-wrap:wrap}
.pixel-preview{display:flex;gap:2px;padding:10px;background:#050510;border-radius:8px;justify-content:center;flex-wrap:wrap}
.pixel{width:10px;height:10px;border-radius:2px;background:#111;transition:background 0.05s}
.slider-row{display:flex;align-items:center;gap:10px;margin:8px 0}
.slider-row label{font-size:0.8em;min-width:60px;color:#aaa}
.slider-row input[type=range]{flex:1;accent-color:#7c6ff5}
.slider-row .val{min-width:35px;text-align:right;font-size:0.8em;color:#7c6ff5}
.block-item{background:#1a1a3e;border-radius:8px;padding:10px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.block-item .info{font-size:0.8em}
.block-item .name{font-weight:600;color:#fff}
.block-item .range{color:#7c6ff5}
.block-item .effect{color:#22c55e;font-size:0.75em}
.block-item .no-effect{color:#666;font-size:0.75em}
.block-item .brightness{color:#f59e0e;font-size:0.75em}
.block-item .actions{display:flex;gap:4px}
.effect-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.log{background:#050510;border-radius:8px;padding:10px;font-family:monospace;font-size:0.7em;color:#888;max-height:120px;overflow-y:auto;margin-top:8px}
.log .ok{color:#22c55e}
.log .err{color:#ef4444}
.log .info{color:#7c6ff5}
input[type=number],input[type=text]{background:#1a1a3e;border:1px solid #2a2a4e;border-radius:6px;padding:6px 10px;color:#e0e0e0;font-size:0.85em;width:100%}
.form-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.form-row label{font-size:0.8em;color:#aaa;min-width:70px}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>🎨 NeoPulse</h1>
    <div class="status">
      <span id="wifi-status">WiFi: --</span>
      <span id="px-status">64 LEDs @ Pin 21</span>
    </div>
  </header>

  <!-- Schnell-Effekte -->
  <div class="card">
    <h2>⚡ Effekte</h2>
    <div class="effect-grid">
      <button class="btn btn-primary" onclick="effect('strobe')">⚡ Strobe</button>
      <button class="btn btn-danger" onclick="effect('fire')">🔥 Fire</button>
      <button class="btn btn-primary" onclick="effect('emergency_us')">🚨 US</button>
      <button class="btn btn-primary" onclick="effect('emergency_de')">🇩🇪 DE</button>
      <button class="btn btn-success" onclick="effect('rainbow')">🌈 Rainbow</button>
      <button class="btn btn-warning" onclick="effect('breathing')">💫 Breathing</button>
    </div>
    <div style="margin-top:10px;display:flex;gap:8px">
      <button class="btn btn-success" onclick="playBlocks()" id="btn-play">▶ Blöcke</button>
      <button class="btn btn-danger" onclick="stopAll()">⏹ Stop</button>
    </div>
  </div>

  <!-- Helligkeit -->
  <div class="card">
    <h2>💡 Helligkeit</h2>
    <div class="slider-row">
      <label>Gesamt:</label>
      <input type="range" id="brightness" min="0" max="100" value="80" oninput="setBrightness(this.value)">
      <span class="val" id="brightness-val">80%</span>
    </div>
  </div>

  <!-- Pixel-Vorschau -->
  <div class="card">
    <h2>🖼️ Vorschau</h2>
    <div class="pixel-preview" id="pixel-preview"></div>
    <div class="slider-row" style="margin-top:10px">
      <label>Farbe:</label>
      <input type="color" id="color-picker" value="#ff0000" oninput="pickColor(this.value)">
      <span class="val" id="color-val">#ff0000</span>
    </div>
    <div class="btn-group" style="margin-top:8px">
      <button class="btn btn-sm btn-primary" onclick="fillColor()">Alle füllen</button>
      <button class="btn btn-sm btn-danger" onclick="clearAll()">Aus</button>
    </div>
  </div>

  <!-- Blöcke -->
  <div class="card">
    <h2>📦 Blöcke</h2>
    <div id="blocks-list"></div>
    <div style="margin-top:10px">
      <button class="btn btn-sm btn-success" onclick="showAddBlock()">+ Block erstellen</button>
    </div>
  </div>

  <!-- Block-Editor (hidden) -->
  <div class="card hidden" id="block-editor">
    <h2>📝 Block bearbeiten</h2>
    <div class="form-row">
      <label>Name:</label>
      <input type="text" id="block-name" placeholder="z.B. Links">
    </div>
    <div class="form-row">
      <label>Start:</label>
      <input type="number" id="block-start" min="0" max="63" value="0" style="width:80px">
      <label>Ende:</label>
      <input type="number" id="block-end" min="0" max="63" value="63" style="width:80px">
    </div>
    <div class="form-row">
      <label>Helligk.:</label>
      <input type="range" id="block-brightness" min="0" max="100" value="100" oninput="document.getElementById('block-bright-val').textContent=this.value+'%'">
      <span class="val" id="block-bright-val">100%</span>
    </div>
    <div class="form-row">
      <label>Effekt:</label>
      <select id="block-effect" style="flex:1;background:#1a1a3e;border:1px solid #2a2a4e;border-radius:6px;padding:6px;color:#e0e0e0">
        <option value="">Keiner</option>
        <option value="strobe">Strobe</option>
        <option value="fire">Fire</option>
        <option value="emergency_us">Emergency US</option>
        <option value="emergency_de">Blaulicht DE</option>
        <option value="rainbow">Rainbow</option>
        <option value="breathing">Breathing</option>
      </select>
    </div>
    <div class="btn-group" style="margin-top:10px">
      <button class="btn btn-sm btn-success" onclick="saveBlock()">💾 Speichern</button>
      <button class="btn btn-sm btn-danger" onclick="cancelBlock()">Abbrechen</button>
    </div>
  </div>

  <!-- Log -->
  <div class="card">
    <h2>📋 Log</h2>
    <div class="log" id="log"></div>
  </div>
</div>

<script>
const ESP = location.origin;
let blocks = [];
let pixels = new Array(64).fill([0,0,0]);
let editingIdx = -1;
let playInterval = null;

function log(msg, type='info') {
  const el = document.getElementById('log');
  const time = new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  el.innerHTML = `<div class="${type}">[${time}] ${msg}</div>` + el.innerHTML;
  if (el.children.length > 50) el.removeChild(el.lastChild);
}

async function api(method, path, data) {
  try {
    const opts = {method, headers:{'Content-Type':'application/json'}};
    if (data) opts.body = JSON.stringify(data);
    const r = await fetch(ESP + path, opts);
    return await r.json();
  } catch(e) {
    return {status:'error', message: e.message};
  }
}

// --- Effekte ---
async function effect(type, duration=8) {
  log(`Starte ${type}...`, 'info');
  const r = await api('POST', '/api/effect/run', {type, duration_ms: duration*1000});
  log(r.status === 'ok' ? `${type} gestartet ✓` : `Fehler: ${r.message}`, r.status);
}

async function stopAll() {
  log('Stoppe...', 'info');
  if (playInterval) { clearInterval(playInterval); playInterval = null; }
  await api('POST', '/api/pixels/set', {pixels: pixels.map((c,i)=>[i,[0,0,0]])});
  updatePreview();
  log('Gestoppt ✓', 'ok');
  document.getElementById('btn-play').textContent = '▶ Blöcke';
}

async function setBrightness(val) {
  document.getElementById('brightness-val').textContent = val + '%';
  await api('POST', '/api/config/brightness', {brightness: parseInt(val)});
}

// --- Pixel ---
function pickColor(hex) {
  document.getElementById('color-val').textContent = hex;
}

async function fillColor() {
  const hex = document.getElementById('color-picker').value;
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  log(`Fülle alle: ${hex}`, 'info');
  const px = pixels.map((_,i)=>[i,[r,g,b]]);
  await api('POST', '/api/pixels/set', {pixels: px});
  pixels = px.map(p=>p[1]);
  updatePreview();
}

async function clearAll() {
  const px = pixels.map((_,i)=>[i,[0,0,0]]);
  await api('POST', '/api/pixels/set', {pixels: px});
  pixels = px.map(p=>p[1]);
  updatePreview();
  log('Alle Pixel aus ✓', 'ok');
}

// --- Vorschau ---
function updatePreview() {
  const container = document.getElementById('pixel-preview');
  if (container.children.length !== 64) {
    container.innerHTML = '';
    for (let i = 0; i < 64; i++) {
      const d = document.createElement('div');
      d.className = 'pixel';
      d.id = 'px-' + i;
      container.appendChild(d);
    }
  }
  for (let i = 0; i < 64; i++) {
    const [r,g,b] = pixels[i] || [0,0,0];
    const el = document.getElementById('px-'+i);
    if (el) el.style.background = `rgb(${r},${g},${b})`;
  }
}

// --- Blöcke ---
function renderBlocks() {
  const list = document.getElementById('blocks-list');
  if (blocks.length === 0) {
    list.innerHTML = '<div style="color:#666;font-size:0.8em">Keine Blöcke. Erstelle einen!</div>';
    return;
  }
  list.innerHTML = blocks.map((b,i) => `
    <div class="block-item">
      <div class="info">
        <div class="name">${b.name}</div>
        <div class="range">LED ${b.start}-${b.end} · <span class="brightness">${b.brightness}%</span></div>
        <div class="${b.effect ? 'effect' : 'no-effect'}">${b.effect || 'Kein Effekt'}</div>
      </div>
      <div class="actions">
        <button class="btn btn-sm btn-primary" onclick="editBlock(${i})">✏️</button>
        <button class="btn btn-sm btn-danger" onclick="deleteBlock(${i})">🗑</button>
      </div>
    </div>
  `).join('');
}

function showAddBlock() {
  editingIdx = -1;
  document.getElementById('block-name').value = 'Block ' + (blocks.length+1);
  document.getElementById('block-start').value = 0;
  document.getElementById('block-end').value = 63;
  document.getElementById('block-brightness').value = 100;
  document.getElementById('block-bright-val').textContent = '100%';
  document.getElementById('block-effect').value = '';
  document.getElementById('block-editor').classList.remove('hidden');
}

function editBlock(i) {
  editingIdx = i;
  const b = blocks[i];
  document.getElementById('block-name').value = b.name;
  document.getElementById('block-start').value = b.start;
  document.getElementById('block-end').value = b.end;
  document.getElementById('block-brightness').value = b.brightness;
  document.getElementById('block-bright-val').textContent = b.brightness + '%';
  document.getElementById('block-effect').value = b.effect || '';
  document.getElementById('block-editor').classList.remove('hidden');
}

async function saveBlock() {
  const name = document.getElementById('block-name').value || 'Block';
  const start = parseInt(document.getElementById('block-start').value) || 0;
  const end = parseInt(document.getElementById('block-end').value) || 63;
  const brightness = parseInt(document.getElementById('block-brightness').value) || 100;
  const effect = document.getElementById('block-effect').value;
  const block = {name, start, end, brightness, effect, params:{}};

  if (editingIdx >= 0) {
    blocks[editingIdx] = block;
    log(`Block "${name}" aktualisiert ✓`, 'ok');
  } else {
    blocks.push(block);
    log(`Block "${name}" erstellt ✓`, 'ok');
  }
  document.getElementById('block-editor').classList.add('hidden');
  renderBlocks();
}

async function deleteBlock(i) {
  if (!confirm('Block "' + blocks[i].name + '" löschen?')) return;
  blocks.splice(i, 1);
  renderBlocks();
  log('Block gelöscht', 'ok');
}

function cancelBlock() {
  document.getElementById('block-editor').classList.add('hidden');
}

// --- Blöcke abspielen ---
async function playBlocks() {
  if (playInterval) {
    clearInterval(playInterval);
    playInterval = null;
    document.getElementById('btn-play').textContent = '▶ Blöcke';
    return;
  }

  const active = blocks.filter(b => b.effect);
  if (active.length === 0) {
    log('Keine Effekte zugewiesen!', 'err');
    return;
  }

  log(`▶ ${active.length} Blöcke...`, 'ok');
  document.getElementById('btn-play').textContent = '⏸ Pause';

  const t0 = Date.now();
  playInterval = setInterval(async () => {
    const t = (Date.now() - t0) / 1000;
    const allPx = new Array(64).fill([0,0,0]);

    for (const b of blocks) {
      if (!b.effect) continue;
      const colors = computeEffect(b, t);
      const br = b.brightness / 100;
      for (let i = 0; i < colors.length; i++) {
        const idx = b.start + i;
        if (idx < 64) {
          allPx[idx] = [
            Math.round(colors[i][0] * br),
            Math.round(colors[i][1] * br),
            Math.round(colors[i][2] * br)
          ];
        }
      }
    }

    pixels = allPx;
    updatePreview();
    const px = allPx.map((c,i)=>[i,c]);
    await api('POST', '/api/pixels/set', {pixels: px});
  }, 50);
}

// --- Lokale Effekt-Berechnung ---
function computeEffect(block, t) {
  const n = block.end - block.start + 1;
  switch(block.effect) {
    case 'strobe': {
      const freq = 3.0;
      const on = (t * freq) % 2 < 1;
      return new Array(n).fill(on ? [255,255,255] : [0,0,0]);
    }
    case 'fire': {
      const colors = [];
      for (let i = 0; i < n; i++) {
        const r = Math.min(255, Math.round(255 * (0.7 + 0.3 * Math.sin(i*0.5 + t*3))));
        const g = Math.min(255, Math.round(180 * Math.max(0, 0.4 + 0.6 * Math.sin(i*0.3 + t*2.5))));
        colors.push([r, g, 0]);
      }
      return colors;
    }
    case 'emergency_us': {
      const freq = 2.0;
      const c = (t * freq) % 2 < 1 ? [255,0,0] : [0,0,255];
      return new Array(n).fill(c);
    }
    case 'emergency_de': {
      const freq = 1.5;
      const phase = (t * freq) % 4;
      let c = [0,0,0];
      if (phase < 0.5) c = [0,0,255];
      else if (phase < 2.0) c = (Math.floor(t*12.5)%2) ? [0,0,255] : [0,0,0];
      return new Array(n).fill(c);
    }
    case 'rainbow': {
      const speed = 1.0;
      const colors = [];
      for (let i = 0; i < n; i++) {
        const hue = ((block.start + i) * 360 / 64 + t * 50 * speed) % 360;
        colors.push(hsvToRgb(hue, 255, 255));
      }
      return colors;
    }
    case 'breathing': {
      const freq = 0.5;
      let pt = (t * freq) % 2;
      if (pt > 1) pt = 2 - pt;
      const bri = Math.round(255 * Math.pow(Math.sin(pt * Math.PI / 2), 2));
      const c = [bri, bri, bri];
      return new Array(n).fill(c);
    }
    default:
      return new Array(n).fill([0,0,0]);
  }
}

function hsvToRgb(h, s, v) {
  const sn = s / 255, vn = v / 255;
  const c = vn * sn;
  const x = c * (1 - Math.abs((h / 60) % 2 - 1));
  const m = vn - c;
  let r,g,b;
  if (h < 60)       { r=c; g=x; b=0; }
  else if (h<120)   { r=x; g=c; b=0; }
  else if (h<180)   { r=0; g=c; b=x; }
  else if (h<240)   { r=0; g=x; b=c; }
  else if (h<300)   { r=x; g=0; b=c; }
  else              { r=c; g=0; b=x; }
  return [Math.round((r+m)*255), Math.round((g+m)*255), Math.round((b+m)*255)];
}

// --- Status ---
async function loadState() {
  const s = await api('GET', '/api/state');
  if (s.status === 'ok') {
    document.getElementById('wifi-status').textContent = 'WiFi: ' + (s.wifi?.sta?.ip || '-');
    document.getElementById('px-status').textContent = s.num_pixels + ' LEDs @ Pin ' + (s.config?.pin || '?');
    document.getElementById('brightness').value = s.config?.brightness || 80;
    document.getElementById('brightness-val').textContent = (s.config?.brightness || 80) + '%';
    if (s.pixels) {
      pixels = s.pixels.length === 64 ? s.pixels : new Array(64).fill([0,0,0]);
      updatePreview();
    }
  }
}

// --- Init ---
loadState();
renderBlocks();
log('NeoPulse WebUI geladen ✓', 'ok');
</script>
</body>
</html>
